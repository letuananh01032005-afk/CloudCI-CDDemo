name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - "chủ yếu" # Vì repo của bạn đang dùng tên nhánh mặc định tiếng Việt là "chủ yếu"

# Cấp quyền cho workflow để có thể deploy lên Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Upload toàn bộ thư mục gốc (nơi chứa file index.html)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
